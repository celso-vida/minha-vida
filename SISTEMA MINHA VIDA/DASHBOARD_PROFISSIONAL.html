<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="theme-color" content="#1e3a5f">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profissional — Celso</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-sync.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#DBDBDB;--primary:#1A4168;--area:#3b9eff;--white:#fff;--border:#c0c8d0;--radius:12px;
  --verde:#16a34a;--vermelho:#dc2626;--amarelo:#ca8a04;--cinza:#64748b;--roxo:#7c3aed;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--primary);min-height:100vh;padding:14px 12px 60px;}
header{display:flex;align-items:center;gap:12px;max-width:1200px;margin:0 auto 14px;flex-wrap:wrap;}
.back-btn{background:var(--area);color:#fff;border:none;border-radius:8px;padding:6px 13px;font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;display:inline-flex;align-items:center;gap:4px;}
.back-btn:hover{opacity:.85;}
.h-title{font-family:'Caveat',cursive;font-size:1.9rem;font-weight:700;color:var(--primary);}
.h-sub{font-size:.72rem;color:var(--primary);opacity:.5;}
.h-date{font-size:.75rem;color:var(--primary);opacity:.55;margin-left:auto;}
.tabs{display:flex;gap:4px;max-width:1200px;margin:0 auto 14px;flex-wrap:wrap;background:var(--white);border-radius:10px;padding:5px;border:1px solid var(--border);}
.tab-btn{border:none;border-radius:7px;padding:7px 13px;font-size:.74rem;font-weight:700;cursor:pointer;font-family:inherit;color:var(--primary);background:transparent;transition:all .15s;white-space:nowrap;}
.tab-btn:hover{background:#f0f4f8;}
.tab-btn.ativo{background:var(--area);color:#fff;}
.tab-panel{display:none;max-width:1200px;margin:0 auto;}
.tab-panel.ativo{display:block;}
.block{background:var(--white);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;border:1px solid var(--border);}
.block-title{font-size:.8rem;color:var(--primary);font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;padding-bottom:7px;border-bottom:2px solid var(--bg);display:flex;align-items:center;gap:8px;}
.empty{font-size:.78rem;color:var(--primary);opacity:.4;padding:10px 0;text-align:center;}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:12px;}
.kpi{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:center;}
.kpi-val{font-size:1.1rem;font-weight:800;margin-bottom:3px;}
.kpi-lbl{font-size:.65rem;text-transform:uppercase;letter-spacing:.07em;opacity:.55;font-weight:700;}
.kpi.verde .kpi-val{color:var(--verde);}
.kpi.vermelho .kpi-val{color:var(--vermelho);}
.kpi.azul .kpi-val{color:var(--area);}
.mes-filter{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.mes-filter select{padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:.78rem;font-family:inherit;color:var(--primary);background:#fff;cursor:pointer;}
.mes-filter label{font-size:.75rem;font-weight:700;opacity:.6;}
.act-tree{display:flex;flex-direction:column;gap:8px;}
.act-card{border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.act-card.nivel-0{border-left:4px solid var(--area);}
.act-card.nivel-1{margin-left:18px;border-left:3px solid var(--amarelo);}
.act-card.nivel-2{margin-left:36px;border-left:3px solid var(--roxo);}
.act-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--white);cursor:pointer;user-select:none;flex-wrap:wrap;}
.act-header:hover{background:#f8fafc;}
.act-expand{font-size:.7rem;opacity:.4;transition:transform .2s;flex-shrink:0;}
.act-expand.open{transform:rotate(90deg);}
.act-nome{font-weight:800;font-size:.85rem;flex:1;min-width:120px;}
.act-status{font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;}
.status-ativo{background:#dcfce7;color:var(--verde);}
.status-pausado{background:#fef9c3;color:var(--amarelo);}
.status-encerrado{background:#fee2e2;color:var(--vermelho);}
.status-planejamento{background:#ede9fe;color:var(--roxo);}
.act-resultado{font-size:.78rem;font-weight:700;white-space:nowrap;}
.act-btns{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap;}
.btn-ic{border:none;border-radius:6px;padding:4px 9px;font-size:.7rem;cursor:pointer;font-family:inherit;font-weight:700;}
.btn-edit{background:#f0f4f8;color:var(--primary);}
.btn-del{background:#fee2e2;color:var(--vermelho);}
.btn-add-sub{background:#f0fdf4;color:var(--verde);}
.btn-link{background:#eff6ff;color:var(--area);text-decoration:none;display:inline-flex;align-items:center;gap:3px;}
.act-body{display:none;padding:14px 16px;background:#f8fafc;border-top:1px solid var(--border);}
.act-body.open{display:block;}
.act-desc{font-size:.78rem;color:var(--primary);opacity:.65;margin-bottom:12px;font-style:italic;line-height:1.5;}
.act-info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:14px;}
.act-info-item{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:8px 10px;}
.act-info-lbl{font-size:.62rem;text-transform:uppercase;letter-spacing:.07em;opacity:.5;font-weight:700;margin-bottom:2px;}
.act-info-val{font-size:.82rem;font-weight:700;}
.act-info-val.verde{color:var(--verde);}
.act-info-val.vermelho{color:var(--vermelho);}
.mov-section{margin-bottom:14px;}
.mov-title{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;opacity:.6;margin-bottom:6px;display:flex;align-items:center;gap:8px;}
.mov-list{display:flex;flex-direction:column;gap:4px;margin-bottom:6px;}
.mov-item{display:flex;align-items:center;gap:8px;background:var(--white);border:1px solid var(--border);border-radius:7px;padding:6px 10px;font-size:.75rem;flex-wrap:wrap;}
.mov-data{opacity:.5;min-width:68px;font-size:.7rem;}
.mov-tipo{font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap;}
.tipo-inicial{background:#dbeafe;color:#1d4ed8;}
.tipo-aporte{background:#dcfce7;color:var(--verde);}
.tipo-retirada{background:#fef9c3;color:var(--amarelo);}
.tipo-pro-labore{background:#ede9fe;color:var(--roxo);}
.tipo-beneficio{background:#f0fdf4;color:var(--verde);}
.tipo-pagamento{background:#fee2e2;color:var(--vermelho);}
.mov-desc{flex:1;opacity:.7;min-width:80px;}
.mov-val{font-weight:800;min-width:90px;text-align:right;}
.mov-del{background:none;border:none;cursor:pointer;color:var(--vermelho);font-size:.72rem;opacity:.45;padding:0 2px;}
.mov-del:hover{opacity:1;}
.add-mov-row{display:flex;gap:6px;flex-wrap:wrap;align-items:flex-end;}
.add-mov-row select,.add-mov-row input{padding:6px 8px;border:1px solid var(--border);border-radius:7px;font-size:.75rem;font-family:inherit;color:var(--primary);background:#fff;}
.add-mov-row select{min-width:110px;}
.add-mov-row input[type=number]{width:100px;}
.add-mov-row input[type=date]{width:128px;}
.add-mov-row input[type=text]{flex:1;min-width:100px;}
.btn-sm{background:var(--area);color:#fff;border:none;border-radius:7px;padding:6px 12px;font-size:.74rem;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;}
.btn-sm:hover{opacity:.85;}
.btn-sm.verde{background:var(--verde);}
.meta-list{display:flex;flex-direction:column;gap:4px;margin-bottom:6px;}
.meta-item{display:flex;align-items:center;gap:8px;background:var(--white);border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-size:.76rem;}
.meta-check{width:15px;height:15px;accent-color:var(--verde);cursor:pointer;flex-shrink:0;}
.meta-txt{flex:1;}
.meta-txt.done{text-decoration:line-through;opacity:.4;}
.meta-prazo{font-size:.65rem;opacity:.5;white-space:nowrap;}
.meta-del{background:none;border:none;cursor:pointer;color:var(--vermelho);font-size:.7rem;opacity:.4;}
.meta-del:hover{opacity:1;}
.add-meta-row{display:flex;gap:6px;flex-wrap:wrap;}
.add-meta-row input{padding:6px 8px;border:1px solid var(--border);border-radius:7px;font-size:.75rem;font-family:inherit;color:var(--primary);background:#fff;}
.add-meta-row input[type=text]{flex:1;min-width:140px;}
.add-meta-row input[type=date]{width:128px;}
.act-children{display:none;padding:6px 0 4px;}
.act-children.open{display:block;}
.add-root-btn{display:flex;align-items:center;gap:6px;background:var(--area);color:#fff;border:none;border-radius:9px;padding:8px 16px;font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:12px;}
.add-root-btn:hover{opacity:.85;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-box{background:#fff;border-radius:14px;padding:22px 24px;width:min(480px,96vw);max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.22);}
.modal-title{font-size:.95rem;font-weight:800;color:var(--primary);margin-bottom:16px;}
.field{margin-bottom:11px;}
.inp-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;opacity:.55;margin-bottom:3px;}
.inp{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:.82rem;font-family:inherit;color:var(--primary);background:#fff;}
.inp:focus{outline:none;border-color:var(--area);}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}
.btn-cancel{background:#f1f5f9;color:var(--primary);border:none;border-radius:8px;padding:7px 18px;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-save{background:var(--area);color:#fff;border:none;border-radius:8px;padding:7px 18px;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-save:hover,.btn-cancel:hover{opacity:.85;}
.meta-global-item{background:var(--white);border:1px solid var(--border);border-radius:9px;padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap;}
.meta-global-act{font-size:.65rem;font-weight:700;background:#eff6ff;color:var(--area);padding:2px 7px;border-radius:10px;white-space:nowrap;}
.resumo-card{background:#f8fafc;border:1px solid var(--border);border-radius:9px;padding:10px 14px;margin-bottom:8px;}

/* ÁREA FOTO */
.area-foto-wrap{flex-shrink:0;cursor:pointer;position:relative;border-radius:14px;overflow:hidden;border:2px solid var(--border);box-shadow:0 4px 16px rgba(0,0,0,.13);transition:transform .2s,box-shadow .2s;width:210px;height:130px;background:var(--area);}
.area-foto-wrap:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.18);}
.area-foto-wrap:hover .area-foto-overlay{opacity:1;}
.area-foto-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;border-radius:12px;z-index:1;}
.area-foto-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;z-index:0;}
.area-foto-placeholder-icon{font-size:2.2rem;opacity:.45;}
.area-foto-placeholder-txt{font-size:.7rem;font-weight:700;color:#fff;opacity:.55;text-transform:uppercase;letter-spacing:.08em;}
.area-foto-overlay{position:absolute;inset:0;background:rgba(0,0,0,.48);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;border-radius:12px;z-index:2;}
.area-foto-overlay span{color:#fff;font-size:.78rem;font-weight:700;background:rgba(255,255,255,.18);padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.3);}
@media(max-width:600px){.area-foto-wrap{width:100%;height:100px;}}
/* ACESSO RÁPIDO */
.link-btn{display:inline-flex;align-items:center;gap:7px;background:var(--primary);color:#fff;border-radius:10px;padding:9px 16px;font-size:.8rem;font-weight:700;text-decoration:none;cursor:pointer;transition:opacity .15s;position:relative;}
.link-btn:hover{opacity:.85;}
.link-btn-edit,.link-btn-del{width:20px;height:20px;border-radius:50%;border:none;cursor:pointer;font-size:.6rem;display:flex;align-items:center;justify-content:center;font-weight:700;}
.link-btn-edit{background:#e0f2fe;color:#0369a1;}
.link-btn-del{background:#fee2e2;color:var(--vermelho);}
</style>
<script>
(function(){var src=localStorage.getItem('foto_perfil');if(!src)return;var lnk=document.querySelector('link[rel~="icon"]');if(!lnk){lnk=document.createElement('link');lnk.rel='icon';document.head.appendChild(lnk);}lnk.href=src;})();
</script>

<body>
<header>
  <a class="back-btn" href="DASHBOARD_GERAL.html">&#8592; Painel Geral</a>
  <div>
    <div class="h-title">&#128188; Profissional</div>
    <div class="h-sub">Atividades Empresariais e Projetos</div>

  <div class="h-date" id="datahoje"></div>
  <div class="area-foto-wrap" onclick="document.getElementById('af-input').click()" title="Clique para adicionar ou trocar a foto">
    <img id="af-img" class="area-foto-img" src="" alt="">
    <div id="af-ph" class="area-foto-placeholder">
      <div class="area-foto-placeholder-icon">&#128188;</div>
      <div class="area-foto-placeholder-txt">Adicionar foto</div>
    </div>
    <div class="area-foto-overlay"><span>&#128247; Trocar foto</span></div>
    <input type="file" id="af-input" accept="image/*" style="display:none" onchange="loadAreaFoto(this)">
  </div>
</header>

<div class="tabs">
  <button class="tab-btn ativo" onclick="abrirAba('visao',this)">&#128202; Visão Geral</button>
  <button class="tab-btn" onclick="abrirAba('atividades',this)">&#127970; Atividades</button>
  <button class="tab-btn" onclick="abrirAba('metas',this)">&#127919; Metas</button>
</div>

<!-- VISÃO GERAL -->
<div class="tab-panel ativo" id="tab-visao">
  <div class="block">
    <div class="block-title">&#128279; Acesso Rápido
      <button class="btn-ic btn-add-sub" style="margin-left:auto;" onclick="abrirModalLink(null)">+ Adicionar</button>
    </div>
    <div id="links-rapidos" style="display:flex;flex-wrap:wrap;gap:10px;min-height:36px;"></div>

</div>

<!-- ATIVIDADES -->
<div class="tab-panel" id="tab-atividades">
  <button class="add-root-btn" onclick="abrirModalAtiv(null,null)">+ Nova Atividade Principal</button>
  <div class="act-tree" id="act-tree"></div>
</div>

<!-- METAS -->
<div class="tab-panel" id="tab-metas">
  <div class="block">
    <div class="block-title">Todas as Metas Profissionais</div>
    <div id="metas-globais"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-ativ" onclick="if(event.target===this)fecharModalAtiv()">
  <div class="modal-box">
    <div class="modal-title" id="modal-ativ-titulo">Nova Atividade</div>
    <div class="field"><div class="inp-label">Nome</div><input class="inp" id="ma-nome" placeholder="Nome da atividade"></div>
    <div class="field"><div class="inp-label">Descricao</div><textarea class="inp" id="ma-desc" rows="3" placeholder="Descricao e objetivo..."></textarea></div>
    <div class="two-col">
      <div class="field"><div class="inp-label">Inicio</div><input class="inp" id="ma-inicio" type="date"></div>
      <div class="field"><div class="inp-label">Status</div>
        <select class="inp" id="ma-status">
          <option value="ativo">Ativo</option>
          <option value="planejamento">Planejamento</option>
          <option value="pausado">Pausado</option>
          <option value="encerrado">Encerrado</option>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="fecharModalAtiv()">Cancelar</button>
      <button class="btn-save" onclick="salvarAtiv()">Salvar</button>
    </div>

</div>

<!-- MODAL LINK -->
<div class="modal-overlay" id="modal-link" onclick="if(event.target===this)fecharModalLink()">
  <div class="modal-box">
    <div class="modal-title" id="modal-link-titulo">Novo Link</div>
    <div class="field"><div class="inp-label">Nome</div><input class="inp" id="ml-nome" placeholder="Ex: 3W HOTELARIA"></div>
    <div class="field"><div class="inp-label">URL</div><input class="inp" id="ml-url" placeholder="https://..."></div>
    <div class="two-col">
      <div class="field"><div class="inp-label">Emoji / Ícone</div><input class="inp" id="ml-emoji" placeholder="🔗" maxlength="4" style="font-size:1.2rem;text-align:center;"></div>
      <div class="field"><div class="inp-label">Cor do botão</div><input class="inp" id="ml-cor" type="color" value="#1A4168" style="height:38px;padding:3px 6px;cursor:pointer;"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="fecharModalLink()">Cancelar</button>
      <button class="btn-save" onclick="salvarLink()">Salvar</button>
    </div>
  </div>
</div>

<script>
'use strict';
const $=id=>document.getElementById(id);
const hoje=new Date();
const hojeStr=hoje.toISOString().slice(0,10);
const MESES=['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

$('datahoje').textContent=hoje.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});

function sv(k,v){localStorage.setItem('prof_'+k,JSON.stringify(v));}
function ld(k,d){try{return JSON.parse(localStorage.getItem('prof_'+k))||d;}catch{return d;}}
function fmtBRL(v){return 'R$ '+parseFloat(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtData(s){if(!s)return '—';const p=s.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function mesStr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}

let atividades=ld('atividades',[]);

(function seed(){
  if(localStorage.getItem('prof_seeded_v1'))return;
  atividades=[
    {id:'wwm',  nome:'WWW MARKETING',                        desc:'Grupo de atividades de hotelaria, exportação e novos projetos ligados à 3W.',inicio:'2012-01-01',status:'ativo',  pai:null,   link:'',movimentos:[],metas:[]},
    {id:'3wh',  nome:'3W HOTELARIA',                         desc:'Empresa de hotelaria — operação gerenciada via sistema externo.',           inicio:'2012-01-01',status:'ativo',  pai:'wwm',  link:'',movimentos:[],metas:[]},
    {id:'exp',  nome:'EXPORTAÇÃO',                            desc:'Atividades de exportação vinculadas ao grupo WWW Marketing.',               inicio:'2020-01-01',status:'planejamento',pai:'wwm',link:'',movimentos:[],metas:[]},
    {id:'npwwm',nome:'NOVOS PROJETOS',                       desc:'Novos projetos do grupo WWW Marketing em desenvolvimento ou análise.',      inicio:'2025-01-01',status:'ativo',  pai:'wwm',  link:'',movimentos:[],metas:[]},
    {id:'dhex', nome:'DHEX — Dubai Hospitality Excellence',desc:'Projeto de hospitalidade de excelência em Dubai. Em estruturação.',      inicio:'2025-01-01',status:'planejamento',pai:'npwwm',link:'',movimentos:[],metas:[]},
    {id:'nacem',nome:'NACEM',                                 desc:'Sociedade com irmãos Eduardo e Ciça. Administra casa de herança familiar.',  inicio:'2000-01-01',status:'ativo',  pai:null,   link:'',movimentos:[],metas:[]},
    {id:'part', nome:'PARTICULAR',                            desc:'Atividades profissionais pessoais e independentes.',                        inicio:'2020-01-01',status:'ativo',  pai:null,   link:'',movimentos:[],metas:[]},
    {id:'np',   nome:'NOVOS PROJETOS',                        desc:'Novos projetos profissionais em análise ou desenvolvimento inicial.',       inicio:'2026-01-01',status:'planejamento',pai:null,link:'',movimentos:[],metas:[]},
  ];
  sv('atividades',atividades);
  localStorage.setItem('prof_seeded_v1','1');
})();

const INVEST_TIPOS=['inicial','aporte'];
const RETORNO_TIPOS=['retirada','pro-labore','beneficio','pagamento'];

function popularMeses(){
  const sel=$('sel-mes');if(!sel)return;
  const atual=mesStr(hoje);
  let o='<option value="todos">Todos os períodos</option>';
  for(let i=11;i>=0;i--){
    const d=new Date(hoje.getFullYear(),hoje.getMonth()-i,1);
    const v=mesStr(d);
    o+=`<option value="${v}"${v===atual?' selected':''}>${MESES[d.getMonth()]} ${d.getFullYear()}</option>`;
  }
  sel.innerHTML=o;
}

function getMes(){return $('sel-mes')?.value||'todos';}

function calcAtivTotal(id,mes){
  const a=atividades.find(x=>x.id===id);if(!a)return{inv:0,ret:0};
  const movs=(a.movimentos||[]).filter(m=>mes==='todos'||m.data.startsWith(mes));
  let inv=movs.filter(m=>INVEST_TIPOS.includes(m.tipo)).reduce((s,m)=>s+parseFloat(m.valor||0),0);
  let ret=movs.filter(m=>RETORNO_TIPOS.includes(m.tipo)).reduce((s,m)=>s+parseFloat(m.valor||0),0);
  atividades.filter(x=>x.pai===id).forEach(c=>{const cc=calcAtivTotal(c.id,mes);inv+=cc.inv;ret+=cc.ret;});
  return{inv,ret};
}

function statusLabel(s){return{ativo:'Ativo',pausado:'Pausado',encerrado:'Encerrado',planejamento:'Planejamento'}[s]||s;}
function tipoLabel(t){return{inicial:'Inicial',aporte:'Aporte',retirada:'Retirada','pro-labore':'Pró-labore',beneficio:'Benefício',pagamento:'Pag. Contas'}[t]||t;}

function abrirAba(id,el){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('ativo'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('ativo'));
  $('tab-'+id).classList.add('ativo');
  if(el)el.classList.add('ativo');
  if(id==='visao')renderVisao();
  if(id==='atividades')renderAtividades();
  if(id==='metas')renderMetasGlobais();
}

function renderVisao(){
  const mes=getMes();
  const roots=atividades.filter(a=>!a.pai);
  let tInv=0,tRet=0;
  roots.forEach(a=>{const c=calcAtivTotal(a.id,mes);tInv+=c.inv;tRet+=c.ret;});
  const res=tRet-tInv;
  const kpi=$('kpi-grid');
  if(kpi)kpi.innerHTML=
    `<div class="kpi vermelho"><div class="kpi-val">${fmtBRL(tInv)}</div><div class="kpi-lbl">Investido</div></div>`+
    `<div class="kpi verde"><div class="kpi-val">${fmtBRL(tRet)}</div><div class="kpi-lbl">Retorno</div></div>`+
    `<div class="kpi ${res>=0?'verde':'vermelho'}"><div class="kpi-val">${fmtBRL(res)}</div><div class="kpi-lbl">Resultado</div></div>`+
    `<div class="kpi azul"><div class="kpi-val">${atividades.filter(a=>a.status==='ativo').length}</div><div class="kpi-lbl">Ativas</div></div>`;
  const div=$('resumo-atividades');
  if(!div)return;
  if(!roots.length){div.innerHTML='<div class="empty">Nenhuma atividade.</div>';return;}
  div.innerHTML=roots.map(a=>{
    const c=calcAtivTotal(a.id,mes);const r=c.ret-c.inv;
    const subs=atividades.filter(x=>x.pai===a.id);
    return `<div class="resumo-card"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;">
      <span style="font-weight:800;font-size:.85rem;flex:1;">${a.nome}</span>
      <span class="act-status status-${a.status}">${statusLabel(a.status)}</span></div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;font-size:.76rem;">
        <span style="color:var(--vermelho);">&#8595; Inv: ${fmtBRL(c.inv)}</span>
        <span style="color:var(--verde);">&#8593; Ret: ${fmtBRL(c.ret)}</span>
        <span style="font-weight:800;color:${r>=0?'var(--verde)':'var(--vermelho)'};">= ${fmtBRL(r)}</span>
      </div>${subs.length?`<div style="font-size:.67rem;opacity:.45;margin-top:4px;">${subs.length} sub-atividade(s)</div>`:''}
    </div>`;
  }).join('');
}

function renderAtividades(){
  const tree=$('act-tree');if(!tree)return;
  const mes=getMes();
  tree.innerHTML=atividades.filter(a=>!a.pai).map(a=>cardHtml(a,0,mes)).join('');
}

function cardHtml(a,nivel,mes){
  const filhos=atividades.filter(x=>x.pai===a.id);
  const c=calcAtivTotal(a.id,mes);const res=c.ret-c.inv;
  const movs=a.movimentos||[];
  const filtMovs=mes==='todos'?movs:movs.filter(m=>m.data.startsWith(mes));
  const invMovs=filtMovs.filter(m=>INVEST_TIPOS.includes(m.tipo));
  const retMovs=filtMovs.filter(m=>RETORNO_TIPOS.includes(m.tipo));

  const linhasMov=(list,grp)=>list.length?list.map(m=>`
    <div class="mov-item">
      <span class="mov-data">${fmtData(m.data)}</span>
      <span class="mov-tipo tipo-${m.tipo}">${tipoLabel(m.tipo)}</span>
      <span class="mov-desc">${m.obs||'—'}</span>
      <span class="mov-val" style="color:${INVEST_TIPOS.includes(m.tipo)?'var(--vermelho)':'var(--verde)'};">${fmtBRL(m.valor)}</span>
      <button class="mov-del" onclick="delMov('${a.id}',${movs.indexOf(m)});event.stopPropagation()">&#10005;</button>
    </div>`).join(''):`<div class="empty" style="padding:3px 0;font-size:.72rem;">Nenhum lançamento.</div>`;

  const addMovRow=(grp)=>`<div class="add-mov-row">
    <select id="tipo-${grp}-${a.id}">${grp==='inv'?
      '<option value="inicial">Inicial</option><option value="aporte">Aporte</option>':
      '<option value="retirada">Retirada</option><option value="pro-labore">Pró-labore</option><option value="beneficio">Benefício</option><option value="pagamento">Pag. Contas</option>'
    }</select>
    <input type="date" id="data-${grp}-${a.id}" value="${hojeStr}">
    <input type="number" id="val-${grp}-${a.id}" placeholder="Valor R$" step="0.01" min="0">
    <input type="text" id="obs-${grp}-${a.id}" placeholder="Descrição">
    <button class="btn-sm" onclick="addMov('${a.id}','${grp}');event.stopPropagation()">+ Lançar</button>
  </div>`;

  const metasHtml=(a.metas||[]).length?(a.metas||[]).map((m,i)=>`
    <div class="meta-item">
      <input type="checkbox" class="meta-check" ${m.done?'checked':''} onchange="toggleMeta('${a.id}',${i})">
      <span class="meta-txt${m.done?' done':''}">${m.txt}</span>
      ${m.prazo?`<span class="meta-prazo">até ${fmtData(m.prazo)}</span>`:''}
      <button class="meta-del" onclick="delMeta('${a.id}',${i});event.stopPropagation()">&#10005;</button>
    </div>`).join(''):`<div class="empty" style="padding:3px 0;font-size:.72rem;">Nenhuma meta.</div>`;

  return `<div class="act-card nivel-${nivel}" id="card-${a.id}">
    <div class="act-header" onclick="toggleCard('${a.id}')">
      <span class="act-expand" id="exp-${a.id}">&#9658;</span>
      <span class="act-nome">${a.nome}</span>
      <span class="act-status status-${a.status}">${statusLabel(a.status)}</span>
      ${(c.inv||c.ret)?`<span class="act-resultado" style="color:${res>=0?'var(--verde)':'var(--vermelho)'};">${fmtBRL(res)}</span>`:''}
      <div class="act-btns" onclick="event.stopPropagation()">
        ${a.id==='3wh'&&a.link?`<a class="btn-ic btn-link" href="${a.link}" >&#128279; Sistema</a>`:''}
        ${nivel<2?`<button class="btn-ic btn-add-sub" onclick="abrirModalAtiv(null,'${a.id}')">+ Sub</button>`:''}
        <button class="btn-ic btn-edit" onclick="abrirModalAtiv('${a.id}',null)">&#9999;&#65039;</button>
        <button class="btn-ic btn-del" onclick="delAtiv('${a.id}')">&#10005;</button>
      </div>
    </div>
    <div class="act-body" id="body-${a.id}">
      ${a.desc?`<div class="act-desc">${a.desc}</div>`:''}
      <div class="act-info-grid">
        <div class="act-info-item"><div class="act-info-lbl">Início</div><div class="act-info-val">${fmtData(a.inicio)}</div></div>
        <div class="act-info-item"><div class="act-info-lbl">Investido</div><div class="act-info-val vermelho">${fmtBRL(c.inv)}</div></div>
        <div class="act-info-item"><div class="act-info-lbl">Retorno</div><div class="act-info-val verde">${fmtBRL(c.ret)}</div></div>
        <div class="act-info-item"><div class="act-info-lbl">Resultado</div><div class="act-info-val ${res>=0?'verde':'vermelho'}">${fmtBRL(res)}</div></div>
      </div>
      <div class="mov-section">
        <div class="mov-title">&#128184; Investimentos <span style="color:var(--vermelho);font-weight:800;">${fmtBRL(invMovs.reduce((s,m)=>s+parseFloat(m.valor||0),0))}</span></div>
        <div class="mov-list">${linhasMov(invMovs,'inv')}</div>
        ${addMovRow('inv')}
      </div>
      <div class="mov-section">
        <div class="mov-title">&#128176; Retornos <span style="color:var(--verde);font-weight:800;">${fmtBRL(retMovs.reduce((s,m)=>s+parseFloat(m.valor||0),0))}</span></div>
        <div class="mov-list">${linhasMov(retMovs,'ret')}</div>
        ${addMovRow('ret')}
      </div>
      <div class="mov-section">
        <div class="mov-title">&#127919; Metas</div>
        <div class="meta-list">${metasHtml}</div>
        <div class="add-meta-row">
          <input type="text" id="meta-txt-${a.id}" placeholder="Nova meta...">
          <input type="date" id="meta-prazo-${a.id}">
          <button class="btn-sm verde" onclick="addMeta('${a.id}');event.stopPropagation()">+ Meta</button>
        </div>
      </div>
    </div>
    ${filhos.length?`<div class="act-children" id="children-${a.id}">${filhos.map(f=>cardHtml(f,nivel+1,mes)).join('')}</div>`:''}
  </div>`;
}

function toggleCard(id){
  $('body-'+id)?.classList.toggle('open');
  $('exp-'+id)?.classList.toggle('open');
  $('children-'+id)?.classList.toggle('open');
}

function addMov(id,grp){
  const a=atividades.find(x=>x.id===id);if(!a)return;
  const tipo=$('tipo-'+grp+'-'+id)?.value;
  const data=$('data-'+grp+'-'+id)?.value||hojeStr;
  const val=parseFloat($('val-'+grp+'-'+id)?.value||0);
  const obs=$('obs-'+grp+'-'+id)?.value.trim()||'';
  if(!val||val<=0){alert('Informe um valor válido.');return;}
  if(!a.movimentos)a.movimentos=[];
  a.movimentos.push({tipo,data,valor:val,obs});
  sv('atividades',atividades);
  renderAtividades();setTimeout(()=>{toggleCard(id);},30);
}

function delMov(id,idx){
  const a=atividades.find(x=>x.id===id);if(!a)return;
  if(!confirm('Excluir lançamento?'))return;
  a.movimentos.splice(idx,1);
  sv('atividades',atividades);
  renderAtividades();setTimeout(()=>{toggleCard(id);},30);
}

function addMeta(id){
  const a=atividades.find(x=>x.id===id);if(!a)return;
  const txt=$('meta-txt-'+id)?.value.trim();if(!txt)return;
  const prazo=$('meta-prazo-'+id)?.value||'';
  if(!a.metas)a.metas=[];
  a.metas.push({txt,prazo,done:false});
  sv('atividades',atividades);
  renderAtividades();setTimeout(()=>{toggleCard(id);},30);
}

function toggleMeta(id,idx){
  const a=atividades.find(x=>x.id===id);if(!a)return;
  a.metas[idx].done=!a.metas[idx].done;
  sv('atividades',atividades);
  renderAtividades();setTimeout(()=>{toggleCard(id);},30);
}

function delMeta(id,idx){
  const a=atividades.find(x=>x.id===id);if(!a)return;
  if(!confirm('Excluir meta?'))return;
  a.metas.splice(idx,1);
  sv('atividades',atividades);
  renderAtividades();setTimeout(()=>{toggleCard(id);},30);
}

function renderMetasGlobais(){
  const div=$('metas-globais');if(!div)return;
  const todas=[];
  atividades.forEach(a=>(a.metas||[]).forEach((m,i)=>todas.push({...m,actNome:a.nome,actId:a.id,idx:i})));
  if(!todas.length){div.innerHTML='<div class="empty">Nenhuma meta cadastrada.</div>';return;}
  const pend=todas.filter(m=>!m.done);
  const conc=todas.filter(m=>m.done);
  const linha=m=>`<div class="meta-global-item">
    <input type="checkbox" class="meta-check" ${m.done?'checked':''} onchange="toggleMeta('${m.actId}',${m.idx});renderMetasGlobais()">
    <span class="meta-txt${m.done?' done':''}" style="flex:1;">${m.txt}</span>
    <span class="meta-global-act">${m.actNome}</span>
    ${m.prazo?`<span class="meta-prazo">até ${fmtData(m.prazo)}</span>`:''}
  </div>`;
  div.innerHTML=(pend.length?`<div style="font-size:.72rem;font-weight:800;opacity:.5;text-transform:uppercase;margin-bottom:6px;">Pendentes (${pend.length})</div>${pend.map(linha).join('')}`:'')
    +(conc.length?`<div style="font-size:.72rem;font-weight:800;opacity:.5;text-transform:uppercase;margin:12px 0 6px;">Concluídas (${conc.length})</div>${conc.map(linha).join('')}`:'');
}

let _editId=null,_editPai=null;
function abrirModalAtiv(id,paiId){
  _editId=id;_editPai=paiId;
  const a=id?atividades.find(x=>x.id===id):null;
  $('modal-ativ-titulo').textContent=id?'Editar Atividade':'Nova Atividade';
  $('ma-nome').value=a?.nome||'';
  $('ma-desc').value=a?.desc||'';
  $('ma-inicio').value=a?.inicio||hojeStr;
  $('ma-status').value=a?.status||'ativo';
  $('ma-link').value=a?.link||'';
  $('modal-ativ').classList.add('open');
}
function fecharModalAtiv(){$('modal-ativ').classList.remove('open');_editId=null;_editPai=null;}
function salvarAtiv(){
  const nome=$('ma-nome').value.trim();if(!nome){alert('Informe o nome.');return;}
  if(_editId){
    const a=atividades.find(x=>x.id===_editId);
    if(a){a.nome=nome;a.desc=$('ma-desc').value.trim();a.inicio=$('ma-inicio').value;a.status=$('ma-status').value;a.link=$('ma-link').value.trim();}
  } else {
    atividades.push({id:'a'+Date.now(),nome,desc:$('ma-desc').value.trim(),inicio:$('ma-inicio').value,status:$('ma-status').value,pai:_editPai||null,link:$('ma-link').value.trim(),movimentos:[],metas:[]});
  }
  sv('atividades',atividades);fecharModalAtiv();renderAtividades();renderVisao();
}
function delAtiv(id){
  function filhosRec(rid){const f=atividades.filter(x=>x.pai===rid);return f.length?f.flatMap(c=>[c,...filhosRec(c.id)]):[]; }
  const subs=filhosRec(id);
  if(!confirm(subs.length?`Esta atividade tem ${subs.length} sub-atividade(s). Excluir tudo?`:'Excluir atividade?'))return;
  const ids=[id,...subs.map(x=>x.id)];
  atividades=atividades.filter(x=>!ids.includes(x.id));
  sv('atividades',atividades);renderAtividades();renderVisao();
}

function renderLinks(){
  const div=document.getElementById('links-rapidos');if(!div)return;
  if(!links.length){div.innerHTML='<span style="font-size:.75rem;opacity:.4;">Nenhum link.</span>';return;}
  div.innerHTML=links.map(l=>`<div style="position:relative;display:inline-flex;" id="lw-${l.id}">
    <a class="link-btn" href="${l.url}"  style="background:${l.cor||'var(--primary)'};">
      ${l.img?`<img src="${l.img}" style="width:22px;height:22px;object-fit:contain;border-radius:3px;flex-shrink:0;">`:`<span>${l.emoji||'🔗'}</span>`}
      <span>${l.nome}</span>
    </a>
    <div style="display:flex;gap:3px;position:absolute;top:-8px;right:-8px;opacity:0;transition:opacity .15s;" id="la-${l.id}">
      <button class="link-btn-edit" onclick="abrirModalLink('${l.id}');event.preventDefault()">&#9998;</button>
      <button class="link-btn-del" onclick="delLink('${l.id}');event.preventDefault()">&#10005;</button>
    </div></div>`).join('');
  links.forEach(l=>{
    const w=document.getElementById('lw-'+l.id),a=document.getElementById('la-'+l.id);
    if(w&&a){w.addEventListener('mouseenter',()=>a.style.opacity='1');w.addEventListener('mouseleave',()=>a.style.opacity='0');}
  });
}
let _editLinkId=null;
function abrirModalLink(id){
  _editLinkId=id;const l=id?links.find(x=>x.id===id):null;
  document.getElementById('ml-nome').value=l?.nome||'';
  document.getElementById('ml-url').value=l?.url||'https://';
  document.getElementById('ml-emoji').value=l?.emoji||'🔗';
  document.getElementById('ml-cor').value=l?.cor||'#1A4168';
  document.getElementById('modal-link-titulo').textContent=id?'Editar Link':'Novo Link';
  document.getElementById('modal-link').classList.add('open');
}
function fecharModalLink(){document.getElementById('modal-link').classList.remove('open');_editLinkId=null;}
function salvarLink(){
  const nome=document.getElementById('ml-nome').value.trim();
  const url=document.getElementById('ml-url').value.trim();
  if(!nome||!url){alert('Nome e URL obrigatórios.');return;}
  if(_editLinkId){const l=links.find(x=>x.id===_editLinkId);if(l){l.nome=nome;l.url=url;l.emoji=document.getElementById('ml-emoji').value.trim()||'🔗';l.cor=document.getElementById('ml-cor').value;delete l.img;}}
  else{links.push({id:'l'+Date.now(),nome,url,emoji:document.getElementById('ml-emoji').value.trim()||'🔗',cor:document.getElementById('ml-cor').value});}
  sv('links',links);fecharModalLink();renderLinks();
}
function delLink(id){if(!confirm('Remover link?'))return;links=links.filter(x=>x.id!==id);sv('links',links);renderLinks();}
// ── FOTO DA ÁREA ─────────────────────────────────────
function loadAreaFoto(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{localStorage.setItem('prof_area_foto',e.target.result);renderAreaFoto();};
  r.readAsDataURL(file);
}
function renderAreaFoto(){
  const src=localStorage.getItem('prof_area_foto');
  const img=document.getElementById('af-img'),ph=document.getElementById('af-ph');
  if(src&&img){img.src=src;img.style.display='block';if(ph)ph.style.display='none';}
  else if(img){img.style.display='none';if(ph)ph.style.display='flex';}
}
