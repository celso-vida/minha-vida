<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="theme-color" content="#1e3a5f">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minha Vida — Entrar</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e3a5f 0%, #2d6a9f 50%, #1a8cad 100%);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      padding: 16px;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.22);
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .logo {
      font-size: 40px;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1e3a5f;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 36px;
    }

    label {
      display: block;
      text-align: left;
      font-size: 13px;
      font-weight: 600;
      color: #334155;
      margin-bottom: 6px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #cbd5e1;
      border-radius: 10px;
      font-size: 15px;
      color: #1e293b;
      outline: none;
      transition: border-color .2s;
      margin-bottom: 18px;
    }

    input:focus {
      border-color: #3b82f6;
    }

    button.btn-login {
      width: 100%;
      padding: 13px;
      background: #1e3a5f;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background .2s, transform .1s;
      margin-top: 4px;
    }

    button.btn-login:hover { background: #2d5182; }
    button.btn-login:active { transform: scale(.98); }
    button.btn-login:disabled { background: #94a3b8; cursor: not-allowed; }

    .error-msg {
      display: none;
      margin-top: 14px;
      padding: 10px 14px;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      font-size: 13px;
      color: #b91c1c;
    }

    .success-msg {
      display: none;
      margin-top: 14px;
      padding: 10px 14px;
      background: #f0fdf4;
      border: 1px solid #86efac;
      border-radius: 8px;
      font-size: 13px;
      color: #166534;
    }

    .forgot {
      display: block;
      margin-top: 16px;
      font-size: 12px;
      color: #64748b;
      cursor: pointer;
      text-decoration: underline;
    }

    .forgot:hover { color: #1e3a5f; }

    .divider {
      border: none;
      border-top: 1px solid #e2e8f0;
      margin: 28px 0 20px;
    }

    .footer-note {
      font-size: 11px;
      color: #94a3b8;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">✝️</div>
  <h1>Minha Vida</h1>
  <p class="subtitle">Sistema pessoal do casal</p>

  <form id="login-form" novalidate>
    <label for="email">E-mail</label>
    <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" required>

    <label for="password">Senha</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>

    <button type="submit" class="btn-login" id="btn-submit">Entrar</button>
  </form>

  <div class="error-msg" id="error-msg"></div>
  <div class="success-msg" id="success-msg"></div>

  <span class="forgot" id="btn-forgot">Esqueci minha senha</span>

  <hr class="divider">
  <p class="footer-note">Dados seguros • Supabase + Vercel</p>
</div>

<script>
  var SUPABASE_URL = 'https://eatfoibrhaobcnpaorlo.supabase.co';
  var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVhdGZvaWJyaGFvYmNucGFvcmxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNDQ4MTMsImV4cCI6MjA5NjcyMDgxM30.phRBbUJ92yAo62DvuUbDYUqTlUD-jkxo9U0PHZF_x7U';

  var db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Se já está logado, redireciona direto
  db.auth.getSession().then(function(resp) {
    if (resp.data.session) {
      window.location.href = 'DASHBOARD_GERAL.html';
    }
  });

  var form    = document.getElementById('login-form');
  var btnSub  = document.getElementById('btn-submit');
  var errMsg  = document.getElementById('error-msg');
  var okMsg   = document.getElementById('success-msg');

  function showError(msg) {
    errMsg.style.display = 'block';
    errMsg.textContent = msg;
    okMsg.style.display = 'none';
  }

  function showSuccess(msg) {
    okMsg.style.display = 'block';
    okMsg.textContent = msg;
    errMsg.style.display = 'none';
  }

  function clearMessages() {
    errMsg.style.display = 'none';
    okMsg.style.display = 'none';
  }

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    clearMessages();

    var email = document.getElementById('email').value.trim();
    var pass  = document.getElementById('password').value;

    if (!email || !pass) {
      showError('Preencha e-mail e senha.');
      return;
    }

    btnSub.disabled = true;
    btnSub.textContent = 'Entrando...';

    var resp = await db.auth.signInWithPassword({ email: email, password: pass });

    if (resp.error) {
      var msg = resp.error.message;
      if (msg.includes('Invalid login')) msg = 'E-mail ou senha incorretos.';
      if (msg.includes('Email not confirmed')) msg = 'Confirme seu e-mail antes de entrar.';
      showError(msg);
      btnSub.disabled = false;
      btnSub.textContent = 'Entrar';
      return;
    }

    // Login ok
    sessionStorage.removeItem('mv_synced'); // força sync na próxima página
    window.location.href = 'DASHBOARD_GERAL.html';
  });

  // Esqueci senha
  document.getElementById('btn-forgot').addEventListener('click', async function() {
    var email = document.getElementById('email').value.trim();
    if (!email) {
      showError('Digite seu e-mail acima para receber o link de redefinição.');
      return;
    }
    clearMessages();
    var resp = await db.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/login.html'
    });
    if (resp.error) {
      showError(resp.error.message);
    } else {
      showSuccess('Link de redefinição enviado para ' + email);
    }
  });

  // Enter no campo senha
  document.getElementById('password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') form.dispatchEvent(new Event('submit'));
  });
</script>

</body>
</html>
