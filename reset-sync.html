<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Resetando sincronização...</title>
<style>
  body { margin:0; background:#0f172a; display:flex; align-items:center; justify-content:center; height:100vh; font-family:system-ui,sans-serif; color:#f1f5f9; text-align:center; }
  .box { padding:40px; }
  .icon { font-size:48px; margin-bottom:16px; }
  p { color:#94a3b8; font-size:14px; margin-top:8px; }
</style>
</head>
<body>
<div class="box">
  <div class="icon">🔄</div>
  <h2>Limpando cache e sincronizando...</h2>
  <p>Você será redirecionado automaticamente.</p>
</div>
<script>
  // Remove o flag que impedia o sync completo
  sessionStorage.removeItem('mv_synced');
  // Redireciona para o dashboard (que vai rodar o sync com overlay)
  setTimeout(function() {
    window.location.href = 'DASHBOARD_GERAL.html';
  }, 800);
</script>
</body>
</html>
